name: "Trigger AzDO Review Pipeline"

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: number
      platform:
        description: 'Platform to review (android, ios, or both)'
        required: true
        type: choice
        options:
          - android
          - ios

permissions:
  contents: read
  pull-requests: write

jobs:
  trigger-review:
    name: Queue Review Pipeline
    runs-on: ubuntu-latest
    if: |
      github.repository_owner == 'dotnet' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event.issue.pull_request != '' &&
        startsWith(github.event.comment.body, '/azp review')))
    steps:
      - name: Parse inputs
        id: parse
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
          else
            COMMENT="${{ github.event.comment.body }}"
            PR_NUMBER="${{ github.event.issue.number }}"
            # Extract platform from comment: /azp review <platform>
            PLATFORM=$(echo "$COMMENT" | sed 's|^/azp review[[:space:]]*||' | tr '[:upper:]' '[:lower:]' | xargs)
            if [ -z "$PLATFORM" ]; then
              PLATFORM="android"
            fi
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate platform
        shell: bash
        run: |
          PLATFORM="${{ steps.parse.outputs.platform }}"
          if [[ "$PLATFORM" != "android" && "$PLATFORM" != "ios" ]]; then
            echo "::error::Invalid platform '$PLATFORM'. Must be 'android' or 'ios'."
            exit 1
          fi

      - name: Queue Azure DevOps pipeline
        shell: bash
        env:
          AZDO_PAT: ${{ secrets.AZDO_PAT }}
        run: |
          PR_NUMBER="${{ steps.parse.outputs.pr_number }}"
          PLATFORM="${{ steps.parse.outputs.platform }}"

          if [ "$PLATFORM" = "ios" ]; then
            POOL_STR='{\\\"name\\\": \\\"AcesShared\\\"}'
          else
            POOL_STR='{\\\"name\\\": \\\"Azure Pipelines\\\", \\\"vmImage\\\": \\\"ubuntu-22.04\\\"}'
          fi

          echo "Queuing review pipeline for PR #${PR_NUMBER} (platform: ${PLATFORM})"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://devdiv.visualstudio.com/DevDiv/_apis/build/builds?api-version=7.0" \
            -H "Authorization: Basic $(echo -n ":${AZDO_PAT}" | base64)" \
            -H "Content-Type: application/json" \
            -d "{
              \"definition\": {\"id\": 27723},
              \"sourceBranch\": \"refs/heads/main\",
              \"templateParameters\": {
                \"PRNumber\": \"${PR_NUMBER}\",
                \"Platform\": \"${PLATFORM}\",
                \"pool\": \"${POOL_STR}\"
              }
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            BUILD_ID=$(echo "$BODY" | jq -r '.id')
            BUILD_URL=$(echo "$BODY" | jq -r '._links.web.href')
            echo "✅ Pipeline queued successfully!"
            echo "Build ID: $BUILD_ID"
            echo "Build URL: $BUILD_URL"
            echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
            echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Failed to queue pipeline (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
        id: queue

      - name: Add reaction to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Comment on PR with build link
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const buildUrl = '${{ steps.queue.outputs.build_url }}';
            const buildId = '${{ steps.queue.outputs.build_id }}';
            const platform = '${{ steps.parse.outputs.platform }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Review pipeline queued for **${platform}**\n\n[View build #${buildId}](${buildUrl})`
            });
