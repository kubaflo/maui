name: Leak Detect CI (no-emulator proof)

# Proves the AI leak-hunter's DETECTION step runs in plain GitHub Actions with
# NO emulator/simulator: a standalone net10.0 xUnit test references the shipped
# Microsoft.Maui.Controls package and reproduces the dotnet/maui#36217 animation
# tweener leak via WeakReference + forced GC. No source build, no workload.

on:
  push:
    branches: [test/leak-detect-ci]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Materialize standalone leak-detection test (shipped package, no workload)
        run: |
          mkdir -p /tmp/leakci
          echo '' | base64 -d > /tmp/leakci/leakci.csproj
          echo '' | base64 -d > /tmp/leakci/AnimationLeakTest.cs
          echo '--- leakci.csproj ---'; cat /tmp/leakci/leakci.csproj
          echo '--- test ---'; cat /tmp/leakci/AnimationLeakTest.cs

      - name: Run leak detection (no emulator, no source build)
        run: |
          cd /tmp/leakci
          dotnet test --logger "console;verbosity=normal"
