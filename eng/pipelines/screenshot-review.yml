# Screenshot Review Pipeline
#
# Lightweight pipeline that runs specific UI tests for a single platform
# and posts screenshots back to the PR as a comment.
#
# Trigger options:
# 1. Via GitHub Actions workflow (screenshot-review.yml) which passes templateParameters
# 2. Via /azp run screenshot-review (reads filter from PR comments)
# 3. Manually from Azure DevOps UI with parameters
#
# Setup: Register this pipeline in Azure DevOps as "screenshot-review"

trigger: none

pr:
  branches:
    include:
    - main
    - release/*
    - net*.0

variables:
  - template: /eng/pipelines/common/variables.yml@self

parameters:
  - name: testFilter
    displayName: 'Test category filter (comma-separated, e.g. Button,Label)'
    type: string
    default: ''

  - name: platform
    displayName: 'Platform to run tests on'
    type: string
    default: android
    values:
      - android
      - ios
      - windows
      - catalyst

  - name: prNumber
    displayName: 'PR number (auto-detected when triggered from PR)'
    type: string
    default: ''

  # Pool definitions — matching ci-uitests.yml structure
  # Public pools (dnceng-public)
  - name: androidPool
    type: object
    default:
      name: AcesShared
      demands:
        - ImageOverride -equals ACES_VM_SharedPool_Tahoe

  - name: androidLinuxPool
    type: object
    default:
      name: MAUI-DNCENG
      demands:
        - ImageOverride -equals 1ESPT-Ubuntu22.04

  - name: iosPool
    type: object
    default:
      name: AcesShared
      demands:
        - ImageOverride -equals ACES_VM_SharedPool_Tahoe

  - name: windowsBuildPool
    type: object
    default:
      name: NetCore-Public
      demands:
        - ImageOverride -equals 1es-windows-2022-open

  - name: windowsPool
    type: object
    default:
      name: NetCore-Public
      demands:
        - ImageOverride -equals 1es-windows-2022-open

  - name: macosPool
    type: object
    default:
      name: Azure Pipelines
      vmImage: macOS-14

stages:
  # ────────────────────────────────────────────────────────────
  # Stage 1: Resolve the test filter (from parameters or PR comments)
  # ────────────────────────────────────────────────────────────
  - stage: resolve_parameters
    displayName: Resolve Parameters
    jobs:
      - job: resolve
        displayName: Read filter from PR comments
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: none
          - task: PowerShell@2
            displayName: 'Resolve test filter and platform'
            name: params
            inputs:
              targetType: 'inline'
              script: |
                $templateFilter = "${{ parameters.testFilter }}"
                $templatePlatform = "${{ parameters.platform }}"
                $prNumber = "${{ coalesce(parameters.prNumber, '$(System.PullRequest.PullRequestNumber)') }}"

                if ($templateFilter) {
                  Write-Host "Using template parameters: filter=$templateFilter, platform=$templatePlatform, PR=#$prNumber"
                  Write-Host "##vso[task.setvariable variable=testFilter;isOutput=true]$templateFilter"
                  Write-Host "##vso[task.setvariable variable=platform;isOutput=true]$templatePlatform"
                  Write-Host "##vso[task.setvariable variable=prNumber;isOutput=true]$prNumber"
                  return
                }

                if (-not $prNumber) {
                  Write-Host "##vso[task.logissue type=error]No PR number found and no filter provided. Provide parameters or run from a PR context."
                  exit 1
                }

                Write-Host "Reading PR #$prNumber comments for /screenshots command..."
                $headers = @{
                  "Accept" = "application/vnd.github.v3+json"
                  "Authorization" = "token $(GITHUB_TOKEN)"
                }
                $commentsUrl = "https://api.github.com/repos/dotnet/maui/issues/$prNumber/comments?per_page=100&sort=created&direction=desc"
                $comments = Invoke-RestMethod -Uri $commentsUrl -Headers $headers -Method Get

                $filter = ""
                $platform = "android"

                foreach ($comment in $comments) {
                  if ($comment.body -match '^/screenshots\s+(\S+)(?:\s+(android|ios|windows|catalyst))?') {
                    $filter = $Matches[1]
                    if ($Matches[2]) { $platform = $Matches[2].ToLower() }
                    Write-Host "Found /screenshots command: filter=$filter, platform=$platform"
                    break
                  }
                }

                if (-not $filter) {
                  Write-Host "##vso[task.logissue type=error]No /screenshots command found in PR comments. Comment '/screenshots <Category> [platform]' on the PR first."
                  exit 1
                }

                Write-Host "##vso[task.setvariable variable=testFilter;isOutput=true]$filter"
                Write-Host "##vso[task.setvariable variable=platform;isOutput=true]$platform"
                Write-Host "##vso[task.setvariable variable=prNumber;isOutput=true]$prNumber"
            env:
              GITHUB_TOKEN: $(GitHubToken)

  # ────────────────────────────────────────────────────────────
  # Stage 2: Build the test host app (single platform)
  # Mirrors build_ui_tests from common/ui-tests.yml
  # ────────────────────────────────────────────────────────────
  - stage: build_screenshot_tests
    displayName: Build Test App (${{ parameters.platform }})
    dependsOn: []
    jobs:
      - job: build_sample
        displayName: Build Sample App (${{ parameters.platform }})
        timeoutInMinutes: 120
        ${{ if eq(parameters.platform, 'windows') }}:
          pool: ${{ parameters.windowsBuildPool }}
        ${{ elseif eq(parameters.platform, 'catalyst') }}:
          pool: ${{ parameters.macosPool }}
        ${{ else }}:
          pool: ${{ parameters.androidPool }}
        variables:
          REQUIRED_XCODE: $(DEVICETESTS_REQUIRED_XCODE)
          APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
        steps:
          - template: common/ui-tests-build-sample.yml
            parameters:
              platform: ${{ parameters.platform }}
              skipProvisioning: true

  # ────────────────────────────────────────────────────────────
  # Stage 3: Run the filtered UI tests
  # Mirrors android_ui_tests / ios_ui_tests from common/ui-tests.yml
  # but runs only the requested category
  # ────────────────────────────────────────────────────────────
  - stage: run_screenshot_tests
    displayName: Run Tests (${{ parameters.platform }} - ${{ parameters.testFilter }})
    dependsOn: build_screenshot_tests
    jobs:
      - job: screenshot_tests
        displayName: ${{ parameters.testFilter }} (${{ parameters.platform }})
        ${{ if eq(parameters.platform, 'android') }}:
          timeoutInMinutes: 240
          pool: ${{ parameters.androidLinuxPool }}
        ${{ elseif eq(parameters.platform, 'ios') }}:
          timeoutInMinutes: 180
          pool: ${{ parameters.iosPool }}
        ${{ elseif eq(parameters.platform, 'windows') }}:
          timeoutInMinutes: 180
          pool: ${{ parameters.windowsPool }}
        ${{ elseif eq(parameters.platform, 'catalyst') }}:
          timeoutInMinutes: 180
          pool: ${{ parameters.macosPool }}
        workspace:
          clean: all
        variables:
          REQUIRED_XCODE: $(DEVICETESTS_REQUIRED_XCODE)
          APPIUM_HOME: $(System.DefaultWorkingDirectory)/.appium/
          resolvedFilter: $[ stageDependencies.resolve_parameters.resolve.outputs['params.testFilter'] ]
          resolvedPrNumber: $[ stageDependencies.resolve_parameters.resolve.outputs['params.prNumber'] ]
        steps:
          - template: common/ui-tests-steps.yml
            parameters:
              platform: ${{ parameters.platform }}
              ${{ if eq(parameters.platform, 'android') }}:
                path: $(System.DefaultWorkingDirectory)/src/Controls/tests/TestCases.Android.Tests/Controls.TestCases.Android.Tests.csproj
                device: android-emulator-64_30
                version: '30'
              ${{ if eq(parameters.platform, 'ios') }}:
                path: $(System.DefaultWorkingDirectory)/src/Controls/tests/TestCases.iOS.Tests/Controls.TestCases.iOS.Tests.csproj
                device: ios-simulator-64
                version: 'latest'
              ${{ if eq(parameters.platform, 'catalyst') }}:
                path: $(System.DefaultWorkingDirectory)/src/Controls/tests/TestCases.Mac.Tests/Controls.TestCases.Mac.Tests.csproj
                device: maccatalyst
                version: 'latest'
              ${{ if eq(parameters.platform, 'windows') }}:
                path: $(System.DefaultWorkingDirectory)/src/Controls/tests/TestCases.WinUI.Tests/Controls.TestCases.WinUI.Tests.csproj
                device: windows
                version: 'latest'
              app: $(Pipeline.Workspace)/Controls.TestCases.HostApp/
              testFilter: ${{ coalesce(parameters.testFilter, '$(resolvedFilter)') }}
              skipProvisioning: true
              headless: true

          # Collect and publish snapshot diffs (same as main pipeline)
          - template: common/ui-tests-collect-snapshot-diffs.yml
            parameters:
              platform: ${{ parameters.platform }}
              artifactName: 'screenshot-review-${{ parameters.platform }}'

  # ────────────────────────────────────────────────────────────
  # Stage 4: Post screenshot results back to the PR comment
  # ────────────────────────────────────────────────────────────
  - stage: post_results
    displayName: Post Results to PR
    dependsOn:
      - resolve_parameters
      - run_screenshot_tests
    condition: always()
    variables:
      resolvedFilter: $[ stageDependencies.resolve_parameters.resolve.outputs['params.testFilter'] ]
      resolvedPlatform: $[ stageDependencies.resolve_parameters.resolve.outputs['params.platform'] ]
      resolvedPrNumber: $[ stageDependencies.resolve_parameters.resolve.outputs['params.prNumber'] ]
    jobs:
      - job: post_screenshots
        displayName: Post Screenshots to PR
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            fetchDepth: 1

          - task: DownloadPipelineArtifact@2
            displayName: Download screenshot artifacts
            continueOnError: true
            inputs:
              artifact: 'screenshot-review-${{ parameters.platform }}'
              path: $(Build.ArtifactStagingDirectory)/screenshots

          - task: PowerShell@2
            displayName: Post screenshots to PR
            condition: and(succeeded(), ne(variables['resolvedPrNumber'], ''))
            inputs:
              filePath: $(System.DefaultWorkingDirectory)/eng/scripts/Post-ScreenshotsToPR.ps1
              arguments: >
                -PRNumber "$(resolvedPrNumber)"
                -TestFilter "$(resolvedFilter)"
                -Platform "$(resolvedPlatform)"
                -ScreenshotsPath "$(Build.ArtifactStagingDirectory)/screenshots"
                -BuildUrl "$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
                -TestResult "$[ stageDependencies.run_screenshot_tests.screenshot_tests.result ]"
            env:
              GITHUB_TOKEN: $(GitHubToken)
